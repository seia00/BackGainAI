<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef, useCallback } = React;

// ── MediaPipe landmark indices ─────────────────────────────────────
const LM = {
  NOSE: 0, L_EAR: 7, R_EAR: 8,
  L_SHOULDER: 11, R_SHOULDER: 12,
  L_ELBOW: 13,    R_ELBOW: 14,
  L_WRIST: 15,    R_WRIST: 16,
  L_HIP: 23,      R_HIP: 24,
};

// ── Helpers ───────────────────────────────────────────────────────
function getStateFromScore(s) {
  if (s >= 75) return 'good';
  if (s >= 50) return 'drifting';
  return 'slouching';
}
function stateColor(st) {
  return { good: '#22c55e', drifting: '#f59e0b', slouching: '#ef4444' }[st] ?? '#22c55e';
}
function stateRgb(st) {
  return { good: '34,197,94', drifting: '245,158,11', slouching: '239,68,68' }[st] ?? '34,197,94';
}
function stateLabel(st) {
  return { good: 'Good Posture', drifting: 'Drifting', slouching: 'Slouching' }[st] ?? 'Good';
}

function computePostureScore(lm, baseline) {
  const nose = lm[LM.NOSE], ls = lm[LM.L_SHOULDER], rs = lm[LM.R_SHOULDER];
  if (!nose || !ls || !rs) return 100;
  const avgShoulderY        = (ls.y + rs.y) / 2;
  const shoulderLevelness   = Math.abs(ls.y - rs.y);
  const noseToShoulderRatio = avgShoulderY - nose.y;
  const levelnessDev = Math.abs(shoulderLevelness - baseline.shoulderLevelness);
  const ratioDev     = baseline.noseToShoulderRatio - noseToShoulderRatio;
  const heightDev    = Math.max(0, avgShoulderY - baseline.avgShoulderY);
  let score = 100;
  score -= levelnessDev * 420;
  score -= Math.max(0, ratioDev) * 260;
  score -= heightDev * 580;
  return Math.max(0, Math.min(100, Math.round(score)));
}

// ── Enhanced Skeleton Renderer ────────────────────────────────────
function drawSkeleton(canvas, lm, postureState) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (!lm || lm.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.13)';
    ctx.font = '13px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Waiting for detection…', W / 2, H / 2);
    return;
  }

  const col = stateColor(postureState);
  const rgb = stateRgb(postureState);

  const get = (id) => {
    const p = lm[id];
    if (!p || p.visibility < 0.38) return null;
    return { x: p.x * W, y: p.y * H, vis: p.visibility };
  };

  const nose = get(LM.NOSE);
  const lear = get(LM.L_EAR);
  const rear = get(LM.R_EAR);
  const ls   = get(LM.L_SHOULDER);
  const rs   = get(LM.R_SHOULDER);
  const le   = get(LM.L_ELBOW);
  const re   = get(LM.R_ELBOW);
  const lw   = get(LM.L_WRIST);
  const rw   = get(LM.R_WRIST);
  const lh   = get(LM.L_HIP);
  const rh   = get(LM.R_HIP);

  const smid = ls && rs ? { x: (ls.x + rs.x) / 2, y: (ls.y + rs.y) / 2 } : null;
  const hmid = lh && rh ? { x: (lh.x + rh.x) / 2, y: (lh.y + rh.y) / 2 } : null;
  const emid = lear && rear ? { x: (lear.x + rear.x) / 2, y: (lear.y + rear.y) / 2 } : null;

  // Tapered bone helper
  const drawBone = (p1, p2, w1, w2 = w1 * 0.65, alpha = 1) => {
    if (!p1 || !p2) return;
    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
    const perp  = angle + Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(p1.x + Math.cos(perp) * w1, p1.y + Math.sin(perp) * w1);
    ctx.lineTo(p2.x + Math.cos(perp) * w2, p2.y + Math.sin(perp) * w2);
    ctx.lineTo(p2.x - Math.cos(perp) * w2, p2.y - Math.sin(perp) * w2);
    ctx.lineTo(p1.x - Math.cos(perp) * w1, p1.y - Math.sin(perp) * w1);
    ctx.closePath();
    const grd = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
    grd.addColorStop(0, `rgba(${rgb},${alpha})`);
    grd.addColorStop(1, `rgba(${rgb},${alpha * 0.55})`);
    ctx.fillStyle = grd;
    ctx.fill();
  };

  const drawJoint = (p, r, glow = true) => {
    if (!p) return;
    if (glow) {
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 3.5);
      grd.addColorStop(0, `rgba(${rgb},0.38)`);
      grd.addColorStop(1, `rgba(${rgb},0)`);
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();
    if (r > 4) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fill();
    }
  };

  // 1. Torso fill with bezier waist curve
  if (ls && rs && lh && rh) {
    const wL = { x: ls.x + (lh.x - ls.x) * 0.45 + (rs.x - ls.x) * 0.06, y: (ls.y + lh.y) / 2 };
    const wR = { x: rs.x + (rh.x - rs.x) * 0.45 - (rs.x - ls.x) * 0.06, y: (rs.y + rh.y) / 2 };
    ctx.beginPath();
    ctx.moveTo(ls.x, ls.y);
    ctx.lineTo(rs.x, rs.y);
    ctx.bezierCurveTo(rs.x, rs.y, wR.x, wR.y, rh.x, rh.y);
    ctx.lineTo(lh.x, lh.y);
    ctx.bezierCurveTo(lh.x, lh.y, wL.x, wL.y, ls.x, ls.y);
    ctx.closePath();
    ctx.fillStyle   = `rgba(${rgb},0.07)`;
    ctx.fill();
    ctx.strokeStyle = `rgba(${rgb},0.22)`;
    ctx.lineWidth   = 1.2;
    ctx.stroke();
  }

  // 2. Bones
  if (smid && hmid) drawBone(smid, hmid, 3.5, 2.5, 0.42); // spine
  drawBone(ls, rs, 4.5, 4.5, 0.78);     // clavicles
  drawBone(ls, le, 6, 4.5, 0.82);       // L upper arm
  drawBone(rs, re, 6, 4.5, 0.82);       // R upper arm
  drawBone(le, lw, 4.5, 3, 0.68);       // L forearm
  drawBone(re, rw, 4.5, 3, 0.68);       // R forearm
  drawBone(lh, rh, 4.5, 4.5, 0.72);    // pelvis
  if (smid && emid) drawBone(smid, emid, 5, 3.5, 0.72); // neck via ears
  else if (smid && nose) {
    const nt = { x: nose.x, y: nose.y + (smid.y - nose.y) * 0.38 };
    drawBone(smid, nt, 5, 3, 0.68);
  }

  // 3. Joints
  drawJoint(ls, 7.5);  drawJoint(rs, 7.5);
  drawJoint(le, 5.5);  drawJoint(re, 5.5);
  drawJoint(lw, 4);    drawJoint(rw, 4);
  drawJoint(lh, 6.5);  drawJoint(rh, 6.5);

  // 4. Head — oval with glow halo
  if (nose) {
    let hcx = nose.x, hcy = nose.y;
    if (lear && rear) { hcx = (lear.x + rear.x) / 2; hcy = (lear.y + rear.y) / 2 - 3; }
    const hr = W * 0.092;
    // Halo
    const hGrd = ctx.createRadialGradient(hcx, hcy, 0, hcx, hcy, hr * 2.6);
    hGrd.addColorStop(0, `rgba(${rgb},0.2)`);
    hGrd.addColorStop(1, `rgba(${rgb},0)`);
    ctx.beginPath();
    ctx.arc(hcx, hcy, hr * 2.6, 0, Math.PI * 2);
    ctx.fillStyle = hGrd;
    ctx.fill();
    // Head oval
    ctx.beginPath();
    ctx.ellipse(hcx, hcy, hr * 0.76, hr, 0, 0, Math.PI * 2);
    ctx.fillStyle   = `rgba(${rgb},0.06)`;
    ctx.fill();
    ctx.strokeStyle = `rgba(${rgb},0.78)`;
    ctx.lineWidth   = 2.5;
    ctx.stroke();
    // Nose dot
    ctx.beginPath();
    ctx.arc(nose.x, nose.y, 3.8, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(nose.x, nose.y, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();
  }
}

// ── Sparkline (SVG) ────────────────────────────────────────────────
function SparklineChart({ data, height = 60 }) {
  if (!data || data.length < 2) {
    return (
      <div style={{ height: `${height}px`, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <span style={{ fontSize:'11px', color:'rgba(255,255,255,0.2)' }}>Collecting data…</span>
      </div>
    );
  }
  const W = 860, H = height;
  const pts = data.map((d, i) => [
    (i / (data.length - 1)) * W,
    H - (d.score / 100) * (H - 10) - 5,
  ]);
  const polyPts = pts.map(p => p.join(',')).join(' ');
  const lastSt  = getStateFromScore(data[data.length - 1].score);
  const col     = stateColor(lastSt);
  const areaD   = `M0,${H} L${pts[0][0]},${pts[0][1]} ${pts.map(p=>`L${p[0]},${p[1]}`).join(' ')} L${pts[pts.length-1][0]},${H} Z`;
  return (
    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{display:'block'}}>
      <defs>
        <linearGradient id="spkG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={col} stopOpacity="0.32"/>
          <stop offset="100%" stopColor={col} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <line x1="0" y1={H-0.75*(H-10)-5} x2={W} y2={H-0.75*(H-10)-5} stroke="rgba(34,197,94,0.16)"  strokeWidth="1" strokeDasharray="4,3"/>
      <line x1="0" y1={H-0.50*(H-10)-5} x2={W} y2={H-0.50*(H-10)-5} stroke="rgba(239,68,68,0.16)"  strokeWidth="1" strokeDasharray="4,3"/>
      <path d={areaD} fill="url(#spkG)"/>
      <polyline points={polyPts} fill="none" stroke={col} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="4" fill={col}/>
    </svg>
  );
}

// ── Disclaimer Page ────────────────────────────────────────────────
function DisclaimerPage({ onContinue }) {
  const items = [
    {
      icon: '🔒',
      title: 'Zero Data Storage',
      body: "None of your data is stored anywhere — not locally, not remotely. All posture analysis runs in your browser's memory and is permanently erased the moment you close the tab.",
      col: '34,197,94',
    },
    {
      icon: '📷',
      title: 'Your Camera Is Never Recorded',
      body: 'We never render, save, or transmit your camera image. MediaPipe extracts only invisible skeletal coordinates in real-time. Your face and body are never visible anywhere in this app.',
      col: '139,92,246',
    },
    {
      icon: '🛡️',
      title: 'Fully On-Device AI',
      body: 'All processing happens locally using MediaPipe Pose. No data, no frames, no analytics are ever sent to any server. This app functions entirely offline once the AI model loads.',
      col: '245,158,11',
    },
  ];

  return (
    <div style={{
      minHeight:'100vh', background:'#030712', position:'relative', overflow:'hidden',
      display:'flex', alignItems:'center', justifyContent:'center', padding:'40px 24px',
    }}>
      <div style={{
        position:'absolute', top:'15%', left:'50%', transform:'translateX(-50%)',
        width:'700px', height:'400px', borderRadius:'50%',
        background:'radial-gradient(ellipse, rgba(34,197,94,0.05) 0%, transparent 70%)',
        filter:'blur(50px)', pointerEvents:'none',
      }}/>
      <div className="dot-grid" style={{ position:'absolute', inset:0, pointerEvents:'none' }}/>

      <div style={{ position:'relative', maxWidth:'640px', width:'100%' }}>

// ── App ────────────────────────────────────────────────────────────
function App() {
  const [phase,           setPhase]           = useState('landing');
  const [countdown,       setCountdown]       = useState(5);
  const [calibSampleCount,setCalibSampleCount]= useState(0);
  const [score,           setScore]           = useState(100);
  const [pState,          setPState]          = useState('good');
  const [notification,    setNotification]    = useState(null);
  const [sessionLog,      setSessionLog]      = useState([]);
  const [sessionSecs,     setSessionSecs]     = useState(0);
  const [alertCount,      setAlertCount]      = useState(0);
  const [avgScore,        setAvgScore]        = useState(100);
  const [camActive,       setCamActive]       = useState(false);
  const [permErr,         setPermErr]         = useState(null);
  const [mpReady,         setMpReady]         = useState(false);
  const [notifPermission, setNotifPermission] = useState(
    'Notification' in window ? Notification.permission : 'denied'
  );

  const videoRef        = useRef(null);
  const calibCanvasRef  = useRef(null);
  const hudCanvasRef    = useRef(null);
  const poseRef         = useRef(null);
  const cameraRef       = useRef(null);
  const baselineRef     = useRef(null);
  const calibSamplesRef = useRef([]);
  const slouchMsRef     = useRef(0);
  const forgiveTimRef   = useRef(null);
  const notifActiveRef  = useRef(false);
  const notifExitTRef   = useRef(null);
  const lastFrameTRef   = useRef(null);
  const lastLogTRef     = useRef(0);
  const sessionStartRef = useRef(null);
  const scoreRef        = useRef(100);
  const phaseRef        = useRef('landing');
  useEffect(() => { phaseRef.current = phase; }, [phase]);

  // Request notification permission on app load
  useEffect(() => {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission().then(perm => setNotifPermission(perm));
    }
  }, []);

  // MediaPipe load check
  useEffect(() => {
    const iv = setInterval(() => {
      if (window.Pose && window.Camera) { setMpReady(true); clearInterval(iv); }
    }, 200);
    return () => clearInterval(iv);
  }, []);

  // Session clock
  useEffect(() => {
    if (phase !== 'monitoring') return;
    const iv = setInterval(() =>
      setSessionSecs(Math.floor((Date.now() - sessionStartRef.current) / 1000)), 1000);
    return () => clearInterval(iv);
  }, [phase]);

  // ── Pose results ────────────────────────────────────────────────
  const onPoseResults = useCallback((results) => {
    const lm = results.poseLandmarks;
    const ph = phaseRef.current;

    if (ph === 'calibrating') {
      const c = calibCanvasRef.current;
      if (c) drawSkeleton(c, lm, 'good');
      if (lm) {
        const nose = lm[LM.NOSE], ls = lm[LM.L_SHOULDER], rs = lm[LM.R_SHOULDER];
        if (nose && ls && rs &&
            nose.visibility > 0.58 && ls.visibility > 0.58 && rs.visibility > 0.58) {
          calibSamplesRef.current.push({
            shoulderLevelness:   Math.abs(ls.y - rs.y),
            noseToShoulderRatio: (ls.y + rs.y) / 2 - nose.y,
            avgShoulderY:        (ls.y + rs.y) / 2,
          });
          setCalibSampleCount(calibSamplesRef.current.length);
        }
      }
      return;
    }

    if (ph !== 'monitoring') return;

    const hc = hudCanvasRef.current;
    if (hc) drawSkeleton(hc, lm, getStateFromScore(scoreRef.current));

    if (!lm || !baselineRef.current) return;

    const newScore = computePostureScore(lm, baselineRef.current);
    scoreRef.current = newScore;
    setScore(newScore);
    const newSt = getStateFromScore(newScore);
    setPState(newSt);

    const now = Date.now();
    if (now - lastLogTRef.current >= 5000) {
      lastLogTRef.current = now;
      setSessionLog(prev => {
        const next = [...prev, { time: now, score: newScore }];
        setAvgScore(Math.round(next.reduce((s,d) => s+d.score, 0) / next.length));
        return next;
      });
    }

    if (!lastFrameTRef.current) lastFrameTRef.current = now;
    const dt = Math.min(now - lastFrameTRef.current, 200);
    lastFrameTRef.current = now;

    if (newSt === 'slouching') {
      if (forgiveTimRef.current) { clearTimeout(forgiveTimRef.current); forgiveTimRef.current = null; }
      slouchMsRef.current += dt;
      if (slouchMsRef.current >= 15000 && !notifActiveRef.current) {
        notifActiveRef.current = true;
        triggerSlouchAlert(Math.round(slouchMsRef.current / 1000));
      }
    } else {
      if (notifActiveRef.current) {
        notifActiveRef.current = false;
        setNotification(prev => prev ? { ...prev, exiting: true } : null);
        if (notifExitTRef.current) clearTimeout(notifExitTRef.current);
        notifExitTRef.current = setTimeout(() => setNotification(null), 320);
      }
      if (slouchMsRef.current > 0 && !forgiveTimRef.current) {
        forgiveTimRef.current = setTimeout(() => {
          slouchMsRef.current = 0;
          forgiveTimRef.current = null;
        }, 5000);
      }
    }
  }, []);

  // ── MediaPipe init ───────────────────────────────────────────────
  const initPose = useCallback(() => {
    if (poseRef.current) return poseRef.current;
    const pose = new window.Pose({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
    });
    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    pose.onResults(onPoseResults);
    poseRef.current = pose;
    return pose;
  }, [onPoseResults]);

  // ── Camera start ─────────────────────────────────────────────────
  const startCamera = useCallback(async (pose) => {
    const video = videoRef.current;
    if (!video) return;
    try {
      const cam = new window.Camera(video, {
        onFrame: async () => {
          const ph = phaseRef.current;
          if (ph === 'calibrating' || ph === 'monitoring') await pose.send({ image: video });
        },
        width: 320, height: 240,
      });
      await cam.start();
      cameraRef.current = cam;
      setCamActive(true);
      setPermErr(null);
    } catch (err) {
      setPermErr(err.message || 'Camera access denied. Please allow camera access and try again.');
    }
  }, []);

  // ── Calibration ──────────────────────────────────────────────────
  const runCalibration = useCallback(() => {
    calibSamplesRef.current = [];
    setCalibSampleCount(0);
    setPhase('calibrating');
    setCountdown(5);
    let count = 5;
    const timer = setInterval(() => {
      count--;
      setCountdown(count);
      if (count <= 0) {
        clearInterval(timer);
        const samples = calibSamplesRef.current;
        if (samples.length > 0) {
          const avg = k => samples.reduce((s,d) => s+d[k], 0) / samples.length;
          baselineRef.current = {
            shoulderLevelness:   avg('shoulderLevelness'),
            noseToShoulderRatio: avg('noseToShoulderRatio'),
            avgShoulderY:        avg('avgShoulderY'),
          };
        }
        sessionStartRef.current = Date.now();
        lastLogTRef.current     = Date.now();
        lastFrameTRef.current   = null;
        slouchMsRef.current     = 0;
        setPhase('monitoring');
      }
    }, 1000);
  }, []);

  // ── Handlers ─────────────────────────────────────────────────────
  const handleStart = useCallback(async () => {
    setPermErr(null);
    const pose = initPose();
    await startCamera(pose);
    setTimeout(() => runCalibration(), 600); // warm-up delay
  }, [initPose, startCamera, runCalibration]);

  const handlePause = useCallback(() => {
    if (cameraRef.current?.stop) cameraRef.current.stop();
    const video = videoRef.current;
    if (video?.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
    setCamActive(false);
    setPhase('paused');
    notifActiveRef.current = false;
    setNotification(null);
  }, []);

  const handleResume = useCallback(async () => {
    const pose = initPose();
    await startCamera(pose);
    setTimeout(() => runCalibration(), 600);
  }, [initPose, startCamera, runCalibration]);

  const handleRecalibrate = useCallback(() => {
    slouchMsRef.current = 0;
    notifActiveRef.current = false;
    setNotification(null);
    runCalibration();
  }, [runCalibration]);

  const triggerSlouchAlert = useCallback((secs) => {
    setAlertCount(c => c + 1);
    if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
      new Notification('BackGainAI — Posture Alert 🔴', {
        body: `You've been slouching for ${secs} seconds. Sit up straight!`,
        tag: 'posture-alert',
      });
    } else {
      setNotification({ msg: `Straighten up — slouching for ${secs}s.`, exiting: false });
    }
  }, []);

  const handleRequestNotif = useCallback(async () => {
    if (!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    setNotifPermission(perm);
    if (perm === 'granted') {
      new Notification('BackGainAI — Alerts Enabled ✓', {
        body: "You'll be notified when slouching is detected, even when the tab is in the background.",
        tag: 'notif-test',
      });
    }
  }, []);

  const isActive = phase === 'monitoring' || phase === 'paused';

  return (
    <div>
      <video ref={videoRef} style={{ display:'none' }} playsInline muted/>

      {phase === 'landing' && (
        <LandingPage onContinue={() => setPhase('disclaimers')} mpReady={mpReady}/>
      )}
      {phase === 'disclaimers' && (
        <DisclaimerPage onContinue={() => setPhase('init')}/>
      )}
      {(phase === 'init' || phase === 'calibrating') && (
        <CalibrationModal
          phase={phase}
          countdown={countdown}
          calibSampleCount={calibSampleCount}
          permErr={permErr}
          mpReady={mpReady}
          onStart={handleStart}
          calibCanvasRef={calibCanvasRef}
        />
      )}
      {isActive && (
        <MonitoringView
          phase={phase}
          score={score}
          pState={pState}
          sessionLog={sessionLog}
          sessionSecs={sessionSecs}
          avgScore={avgScore}
          alertCount={alertCount}
          camActive={camActive}
          hudCanvasRef={hudCanvasRef}
          onPause={handlePause}
          onResume={handleResume}
          onRecalibrate={handleRecalibrate}
          notifPermission={notifPermission}
          onRequestNotif={handleRequestNotif}
        />
      )}

      {/* Notification toast */}
      {notification && isActive && (
        <div
          className={notification.exiting ? 'notif-exit' : 'notif-enter'}
          style={{
            position:'fixed', right:'24px', top:'72px', zIndex:2000,
            background:'rgba(239,68,68,0.1)',
            backdropFilter:'blur(22px)', WebkitBackdropFilter:'blur(22px)',
            border:'1px solid rgba(239,68,68,0.3)',
            borderRadius:'100px', padding:'13px 24px',
            display:'flex', alignItems:'center', gap:'11px',
            boxShadow:'0 4px 36px rgba(239,68,68,0.22)',
            maxWidth:'370px',
          }}
        >
          <div style={{
            width:'8px', height:'8px', borderRadius:'50%',
            background:'#ef4444', flexShrink:0, animation:'pulse 1.5s infinite',
          }}/>
          <span style={{ fontSize:'13px', color:'rgba(255,255,255,0.9)', fontWeight:'500', lineHeight:1.35 }}>
            {notification.msg}
          </span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
